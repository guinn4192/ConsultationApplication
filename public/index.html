<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こころの相談室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <svg class="sketch-filters" aria-hidden="true" focusable="false">
    <defs>
      <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="rough-heavy" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="rough-underline">
        <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="3"/>
        <feDisplacementMap in="SourceGraphic" scale="2"/>
      </filter>
    </defs>
  </svg>

  <header class="header" id="app-header">
    <h1 class="header-title">こころの相談室</h1>
    <p class="header-subtitle">あなたの悩みに寄り添うAIカウンセラー</p>
    <div class="header-user-row">
      <span id="header-user-name" class="header-user-name" hidden aria-live="polite"></span>
      <a href="#/history" id="header-history-link" class="header-history-link" hidden>過去の相談履歴</a>
    </div>
    <button id="new-consultation-button" class="new-consultation-button" disabled aria-label="新しい相談を始める">
      新しい相談を始める
    </button>
    <div class="theme-section">
      <div class="theme-buttons">
        <button type="button" class="theme-button active" data-theme="default" title="ぬくもり">🍂</button>
        <button type="button" class="theme-button" data-theme="ocean" title="やすらぎ">🌊</button>
        <button type="button" class="theme-button" data-theme="forest" title="いやし">🌿</button>
        <button type="button" class="theme-button" data-theme="night" title="よるのしじま">🌙</button>
        <button type="button" class="theme-button" data-theme="sakura" title="はなごころ">🌸</button>
      </div>
    </div>
  </header>

  <!-- Feature 16: 本日の変化サマリカード（モーダル） -->
  <div id="summary-modal" class="summary-modal" hidden aria-hidden="true"></div>

  <!-- Feature 21: 中断した会話の再開モーダル -->
  <div id="resume-modal" class="resume-modal" hidden aria-hidden="true"></div>

  <!-- Feature 18: オンボーディング画面 -->
  <section id="onboarding-screen" class="onboarding-screen" hidden aria-label="ユーザー名登録"></section>

  <!-- Feature 20: 過去の相談履歴画面 -->
  <section id="history-screen" class="history-screen-container" hidden aria-label="過去の相談履歴"></section>

  <main class="chat-container" id="chat-container">
    <div id="chat-messages" class="chat-messages">
      <!-- Messages will appear here -->
    </div>

    <div class="input-area">
      <div class="mode-section">
        <p class="mode-label">相談モード:</p>
        <div class="mode-buttons">
          <button type="button" class="mode-button active" data-mode="default">バランス</button>
          <button type="button" class="mode-button" data-mode="empathy">共感モード</button>
          <button type="button" class="mode-button" data-mode="solution">解決モード</button>
        </div>
        <p class="mode-description" id="mode-description">共感とアドバイスをバランスよく提供します</p>
      </div>
      <div class="category-section">
        <p class="category-label">相談カテゴリ（任意）:</p>
        <div id="category-buttons" class="category-buttons">
          <button type="button" class="category-button" data-category="仕事">仕事</button>
          <button type="button" class="category-button" data-category="人間関係">人間関係</button>
          <button type="button" class="category-button" data-category="健康">健康</button>
          <button type="button" class="category-button" data-category="日常生活">日常生活</button>
          <button type="button" class="category-button" data-category="恋愛">恋愛</button>
          <button type="button" class="category-button" data-category="お金">お金</button>
        </div>
      </div>
      <form id="consult-form" class="input-form">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="お悩みをここに入力してください..."
            rows="3"
            aria-label="相談内容入力欄"
          ></textarea>
          <div class="char-count-wrapper">
            <span id="char-count" class="char-count">0 / 1000</span>
          </div>
          <div id="error-message" class="error-message" hidden></div>
        </div>
        <button type="submit" id="send-button" class="send-button" aria-label="送信">
          送信する
        </button>
      </form>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
